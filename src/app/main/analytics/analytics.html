  <div class="analytics">
    <h2>📊 Listener Analytics</h2>

    <div class="stats">
      <div class="stat-card">
        <h3>Total Listeners</h3>
        <p>{{ stats?.total }}</p>
      </div>
      <div class="stat-card">
        <h3>Peak Listeners</h3>
        <p>{{ stats?.peak }}</p>
      </div>
      <div class="stat-card">
        <h3>Countries</h3>
        <p>{{ stats?.countries }}</p>
      </div>
    </div>

    <canvas id="listenersChart"></canvas>
  </div>
