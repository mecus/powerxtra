<div class="deck-container">
  <!-- STICKY TOP: Mic & Live Controls -->
  <header class="live-toolbar" [class.on-air]="isOnAir()">
    <div class="mic-section">
      <div class="vu-meter">
        <div class="vu-bar" [style.height.%]="vuLevel()"></div>
        <mat-icon [class.active]="isMicOn()">mic</mat-icon>
      </div>
      <div class="mic-info">
        <span class="label">MICROPHONE</span>
        <button mat-fab [color]="isMicOn() ? 'warn' : 'primary'" (click)="toggleMic()">
          <mat-icon>{{ isMicOn() ? 'mic' : 'mic_off' }}</mat-icon>
        </button>
      </div>
    </div>

    <div class="broadcast-status">
      <div class="on-air-badge" [class.blink]="isOnAir()">
        {{ isOnAir() ? 'ON AIR' : 'OFFLINE' }}
      </div>
      <div class="timer">00:42:15</div>
    </div>

    <div class="master-controls">
      <button mat-flat-button color="accent" (click)="isOnAir.set(!isOnAir())">
        {{ isOnAir() ? 'STOP BROADCAST' : 'GO LIVE' }}
      </button>
      <button mat-icon-button><mat-icon>settings</mat-icon></button>
    </div>
  </header>

  <!-- SCROLLABLE: Playlist & Library -->
  <main class="content-area">
    <section class="playlist-pane">
      <div class="pane-header">
        <h2>LIVE PLAYLIST</h2>
        <span class="count">{{ playlist().length }} Tracks</span>
      </div>

      <div class="track-list">
        @for (track of playlist(); track track.id) {
          <div class="track-card" [attr.data-status]="track.status">
            <div class="status-indicator"></div>
            <div class="details">
              <span class="title">{{ track.title }}</span>
              <span class="artist">{{ track.artist }}</span>
            </div>
            <span class="duration">{{ track.duration }}</span>
            <div class="actions">
              <button mat-icon-button><mat-icon>play_arrow</mat-icon></button>
              <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>more_vert</mat-icon></button>
            </div>
          </div>
        }
      </div>
    </section>

    <!-- Side Widgets -->
    <aside class="side-widgets">
      <div class="widget chat-widget">
        <h3>LISTENER MESSAGES</h3>
        <div class="empty-msg">No new messages</div>
      </div>
      <div class="widget jingle-pad">
        <h3>JINGLE PAD</h3>
        <div class="grid">
          <button mat-stroked-button>INTRO</button>
          <button mat-stroked-button>OUTRO</button>
          <button mat-stroked-button>ID</button>
          <button mat-stroked-button>BUMP</button>
        </div>
      </div>
    </aside>
  </main>
</div>

<mat-menu #menu="matMenu" class="dark-menu">
  <button mat-menu-item>Move to Top</button>
  <button mat-menu-item>Remove from Queue</button>
</mat-menu>
