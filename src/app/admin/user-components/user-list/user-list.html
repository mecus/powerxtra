<div class="admin-page-container">
  <header class="page-header form-field-round">
    <div class="title-group">
      <h1>User Management</h1>
      <p>Manage permissions and account status for all listeners.</p>
    </div>

    <!-- Modern Search Bar -->
    <mat-form-field appearance="outline" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <mat-label>Search users...</mat-label>
      <input matInput [(ngModel)]="searchQuery" placeholder="Name or email">
    </mat-form-field>
  </header>

  <div class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="filteredUsers()">

      <!-- User Column -->
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef> User </th>
        <td mat-cell *matCellDef="let user">
          <div class="user-info">
            <img [src]="user.avatar" class="avatar">
            <div class="text">
              <span class="name">{{user.displayName}}</span>
              <span class="email">{{user.email}}</span>
            </div>
          </div>
        </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let user">
          <span class="role-tag">{{user.accountType}}</span>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let user">
          <span class="status-dot" [class]="user?.status"></span>
          {{user.status | titlecase}}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user" class="action-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu" class="dark-menu">
            <button mat-menu-item (click)="onView(user)">
              <mat-icon>visibility</mat-icon><span>View Profile</span>
            </button>
            <button mat-menu-item (click)="onEdit(user)">
              <mat-icon>edit</mat-icon><span>Edit User</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="onDelete(user)" class="delete-btn">
              <mat-icon>delete</mat-icon><span>Remove</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['user', 'role', 'status', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['user', 'role', 'status', 'actions'];"></tr>
    </table>

    <!-- Empty State -->
    @if (filteredUsers().length === 0) {
      <div class="empty-state">
        <mat-icon>person_search</mat-icon>
        <p>No users found matching "{{searchQuery()}}"</p>
      </div>
    }
  </div>
</div>
